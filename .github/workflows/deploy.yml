name: Deploy Static Site
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cloudflared on Runner
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Use Service Tokens to bypass the Cloudflare Access login
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
          EOF

          # Sync the static files to the VPS
          rsync -e "ssh -o StrictHostKeyChecking=no" -avz --delete --exclude '.git' . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/${{ github.event.repository.name }}

          # Build and Serve on the VPS
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/${{ github.event.repository.name }}
            
            # 1. Run the build (If using Vite/Astro/Tailwind)
            # If it's just plain HTML, you can skip these two lines:
            pnpm install
            pnpm build

            # 2. Tell PM2 to serve the folder
            # Replace 'dist' with your build folder (e.g., 'build', 'out', or '.' for root)
            # Change '8080' to whatever port you want this site to live on
            /usr/bin/pm2 delete ${{ github.event.repository.name }} || true
            /usr/bin/pm2 serve dist 8080 --name ${{ github.event.repository.name }} --spa
            
            # 3. Save the process
            /usr/bin/pm2 save
          EOF
